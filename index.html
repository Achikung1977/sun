<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเชื่อมต่อ Google Apps Script</title>
    <style>
        /* ตกแต่งหน้าเว็บเล็กน้อยเพื่อให้ดูง่ายขึ้นครับ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
        .loading {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ดึงข้อมูลจาก Google Apps Script</h2>
        <p>กดปุ่มด้านล่างเพื่อรับข้อความจากระบบหลังบ้าน (code.gs)</p>
        <button id="fetchBtn">ดึงข้อมูล</button>
        
        <div id="result">ยังไม่มีการเรียกข้อมูล</div>
    </div>

    <script>
        // ⚠️ สำคัญมาก: นำลิงก์ Web App URL ที่ได้จากการ Deploy ใน Google Apps Script มาใส่แทนที่ตรงนี้ครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyKFVECwDV1KPJTqQ9bPjZi6zKtVwFIslNBfRRHFAywNynheQf6y8EXb2PpAh1dmj8/exec"; 

        document.getElementById("fetchBtn").addEventListener("click", function() {
            const resultDiv = document.getElementById("result");
            
            // แสดงสถานะระหว่างรอระบบประมวลผล
            resultDiv.innerText = "กำลังโหลดข้อมูล...";
            resultDiv.className = "loading";

            // เริ่มทำการเชื่อมต่อไปยัง Google Apps Script
            fetch(WEB_APP_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("เครือข่ายมีปัญหา ไม่สามารถเชื่อมต่อได้");
                    }
                    return response.json(); // แปลงข้อมูลที่ได้กลับมาเป็น JSON
                })
                .then(data => {
                    // นำข้อมูลที่ได้ (ในที่นี้คือข้อความ message) ไปแสดงในดิฟ #result
                    resultDiv.innerText = data.message;
                    resultDiv.className = ""; // เอาคลาสโหลดออก
                })
                .catch(error => {
                    // หากเกิดข้อผิดพลาด ให้แสดงแจ้งเตือน
                    console.error("เกิดข้อผิดพลาด:", error);
                    resultDiv.innerText = "เกิดข้อผิดพลาด: ไม่สามารถดึงข้อมูลได้ (เช็ก URL หรือสิทธิ์การเข้าถึง)";
                    resultDiv.style.color = "red";
                });
        });
    </script>

</body>
</html>
