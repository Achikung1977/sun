<script>

const API_URL =
'https://script.google.com/macros/s/AKfycbzmGOjnXZkTYZLHrk53ffL7TuFhbGRsDYpHNe5Xu9DQoWdJdnE9sJ7zT2lHMi7oxu4/exec';

let allData = [];

window.onload = () => {
    loadData();
};

async function loadData() {

    document.getElementById('loading').style.display = 'flex';

    try {

        const response = await fetch(
            `${API_URL}?action=getData`
        );

        const data = await response.json();

        allData = data;

        updateDashboard();
        renderLevelButtons();
        renderAttendance();

    } catch (err) {

        Swal.fire({
            icon: 'error',
            title: 'โหลดข้อมูลไม่สำเร็จ',
            text: err.message
        });

    } finally {

        document.getElementById('loading').style.display = 'none';
    }
}

/**
 * บันทึกสถานะ
 */
async function toggleStatus(id, field, isChecked) {

    const val = isChecked ? 'Y' : '';

    try {

        const response = await fetch(API_URL, {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                action: 'updateAttendance',
                studentId: id,
                field: field,
                value: val
            })
        });

        const result = await response.json();

        if (!result.success) {

            Swal.fire({
                icon: 'error',
                title: 'บันทึกไม่สำเร็จ'
            });
        }

    } catch (err) {

        Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: err.message
        });
    }
}

/**
 * บันทึกข้อมูลนักศึกษา
 */
async function submitEdit() {

    const formData = {
        studentId: document.getElementById('edit-studentId').value,
        name: document.getElementById('edit-name').value,
        lastName: document.getElementById('edit-lastName').value,
        nickName: document.getElementById('edit-nickName').value,
        tel: document.getElementById('edit-tel').value,
        fName: document.getElementById('edit-fName').value,
        fLastName: document.getElementById('edit-fLastName').value,
        fTel: document.getElementById('edit-fTel').value,
        mName: document.getElementById('edit-mName').value,
        mLastName: document.getElementById('edit-mLastName').value,
        mTel: document.getElementById('edit-mTel').value,
        pName: document.getElementById('edit-pName').value,
        pLastName: document.getElementById('edit-pLastName').value,
        pTel: document.getElementById('edit-pTel').value
    };

    Swal.fire({
        title: 'กำลังบันทึก...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {

        const response = await fetch(API_URL, {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                action: 'saveStudentData',
                formData: formData
            })
        });

        const result = await response.json();

        Swal.close();

        if (result.success) {

            Swal.fire({
                icon: 'success',
                title: 'บันทึกสำเร็จ'
            });

            bootstrap
                .Modal
                .getInstance(
                    document.getElementById('editModal')
                )
                .hide();

            loadData();

        } else {

            Swal.fire({
                icon: 'error',
                title: result.error
            });
        }

    } catch (err) {

        Swal.fire({
            icon: 'error',
            title: err.message
        });
    }
}

</script>
